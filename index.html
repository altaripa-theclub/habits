<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Giorni di fila</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#16201F">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="favicon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Giorni di fila">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  :root{
    --paper:#F4F6F5;
    --card:#FFFFFF;
    --ink:#16201F;
    --muted:#6B7A77;
    --line:#E2E7E5;
    --teal:#2E7D6B;
    --teal-soft:#E4F0EC;
    --amber:#C8642A;
    --amber-soft:#F6E7DC;
    --display:'Fraunces',Georgia,serif;
    --body:'Inter',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{background:var(--paper);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  body{min-height:100vh;display:flex;justify-content:center;padding:28px 18px 60px}
  .wrap{width:100%;max-width:460px}

  .topline{display:flex;align-items:center;justify-content:space-between;margin-bottom:30px}
  .date{font-size:13px;color:var(--muted);font-weight:500;letter-spacing:.02em}
  .best{font-size:13px;color:var(--muted);font-weight:500}
  .best b{color:var(--ink);font-weight:600}

  .hero{text-align:center;margin-bottom:8px}
  .eyebrow{font-size:12px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:600;margin-bottom:6px}
  .count{font-family:var(--display);font-weight:600;font-size:128px;line-height:.9;color:var(--amber);font-variant-numeric:tabular-nums;transition:color .3s}
  .count.zero{color:var(--ink);opacity:.28}
  .count-label{font-family:var(--display);font-size:22px;font-weight:500;color:var(--ink);margin-top:2px}
  .subnote{font-size:14px;color:var(--muted);margin-top:12px;min-height:20px;line-height:1.5}

  .chain{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin:26px 0 34px}
  .dot{width:14px;height:14px;border-radius:50%;border:1.5px solid var(--line);background:transparent;transition:all .25s}
  .dot.done{background:var(--teal);border-color:var(--teal)}
  .dot.today{box-shadow:0 0 0 3px var(--teal-soft)}
  .dot.today.done{box-shadow:0 0 0 3px var(--amber-soft);background:var(--amber);border-color:var(--amber)}

  .cardtitle{font-family:var(--display);font-size:19px;font-weight:600;margin-bottom:2px}
  .cardsub{font-size:13px;color:var(--muted);margin-bottom:16px}

  .list{display:flex;flex-direction:column;gap:10px}
  .item{display:flex;align-items:center;gap:14px;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:16px 18px;cursor:pointer;user-select:none;transition:border-color .2s,background .2s}
  .item:hover{border-color:#CBD4D1}
  .item.checked{background:var(--teal-soft);border-color:var(--teal)}
  .box{flex:none;width:26px;height:26px;border-radius:9px;border:2px solid #C2CCC9;display:flex;align-items:center;justify-content:center;transition:all .2s}
  .item.checked .box{background:var(--teal);border-color:var(--teal)}
  .box svg{width:15px;height:15px;stroke:#fff;stroke-width:3.5;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.5);transition:all .2s}
  .item.checked .box svg{opacity:1;transform:scale(1)}
  .label{flex:1}
  .label .t{font-size:15px;font-weight:600;line-height:1.25}
  .label .d{font-size:13px;color:var(--muted);margin-top:1px}
  .item.checked .label .t{color:var(--teal)}
  .item .ico{flex:none;color:var(--muted);opacity:.7}
  .item.checked .ico{color:var(--teal);opacity:1}

  .done-banner{margin-top:18px;text-align:center;font-size:14px;color:var(--teal);font-weight:600;opacity:0;transition:opacity .3s;min-height:20px}
  .done-banner.show{opacity:1}

  .foot{margin-top:34px;display:flex;flex-direction:column;align-items:center;gap:16px}
  .export{display:inline-flex;align-items:center;gap:9px;background:var(--ink);color:#fff;border:none;border-radius:13px;padding:13px 22px;font-family:var(--body);font-size:14px;font-weight:600;cursor:pointer;transition:opacity .2s}
  .export:hover{opacity:.88}
  .export svg{width:17px;height:17px;stroke:currentColor;stroke-width:2;fill:none;stroke-linecap:round;stroke-linejoin:round}
  .reset{background:none;border:none;color:var(--muted);font-size:12px;font-family:var(--body);cursor:pointer;text-decoration:underline;text-underline-offset:3px}
  .reset:hover{color:var(--amber)}

  .loading{text-align:center;color:var(--muted);font-size:14px;padding:60px 0}

  @media (max-width:420px){.count{font-size:104px}}
</style>

<div class="wrap" id="app">
  <div class="loading">Carico i tuoi giorni…</div>
</div>

<script>
const TASKS = [
  {key:'pages',   t:'Leggere 7 pagine',         d:'prima del telefono, stesso orario', icon:'M4 5a2 2 0 0 1 2-2h6v16H6a2 2 0 0 0-2 2zM20 5a2 2 0 0 0-2-2h-6v16h6a2 2 0 0 1 2 2z'},
  {key:'nobet',   t:'Nessuna scommessa',        d:'né sala né online — il giorno che conta di più', icon:'M5 5l14 14M19 5L5 19'},
  {key:'protein', t:'100g di proteine',          d:'distribuite nei pasti', icon:'M5 11a6 6 0 0 1 6-6c4 0 6 3 8 3a3 3 0 0 1 0 6c-2 0-3-1-4-1M5 11a6 6 0 0 0 6 6'},
  {key:'workout', t:'Un allenamento',            d:'qualsiasi tipo, basta muoversi', icon:'M6 8v8M18 8v8M3 10v4M21 10v4M6 12h12'},
];
const STORE_KEY = 'giorni-di-fila-v1';

function todayStr(d){ d=d||new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function shiftStr(base, delta){ const d=new Date(base+'T12:00:00'); d.setDate(d.getDate()+delta); return todayStr(d); }
function dayComplete(rec){ return rec && TASKS.every(t=>rec[t.key]); }

let DATA = {};

async function load(){
  try{ const r = localStorage.getItem(STORE_KEY); DATA = r ? JSON.parse(r) : {}; }
  catch(e){ DATA = {}; }
}
async function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(DATA)); }catch(e){}
}

function streak(){
  const today = todayStr();
  let start = today;
  if(!dayComplete(DATA[today])){
    const y = shiftStr(today,-1);
    if(dayComplete(DATA[y])) start = y; else return 0;
  }
  let n=0, cur=start;
  while(dayComplete(DATA[cur])){ n++; cur=shiftStr(cur,-1); }
  return n;
}

function bestStreak(){
  const keys = Object.keys(DATA).filter(k=>dayComplete(DATA[k])).sort();
  if(!keys.length) return 0;
  let best=1, run=1;
  for(let i=1;i<keys.length;i++){
    if(shiftStr(keys[i-1],1)===keys[i]) run++; else run=1;
    if(run>best) best=run;
  }
  return Math.max(best, streak());
}

function fmtDate(){
  const d=new Date();
  const s=d.toLocaleDateString('it-IT',{weekday:'long',day:'numeric',month:'long'});
  return s.charAt(0).toUpperCase()+s.slice(1);
}

function subnote(s, allDone){
  if(allDone) return 'Giornata completa. Catena salva.';
  if(s===0) return 'Spunta tutto oggi per (ri)partire da 1.';
  if(s===1) return 'Un giorno. Da qui si costruisce.';
  if(s<7) return s+' giorni di fila. Tieni il ritmo.';
  if(s<30) return s+' giorni. La catena sta diventando forte.';
  return s+' giorni. Questa ormai è la tua normalità.';
}

function render(){
  const today = todayStr();
  if(!DATA[today]) DATA[today] = {};
  const rec = DATA[today];
  const s = streak();
  const allDone = dayComplete(rec);
  const best = bestStreak();

  const dots = [];
  for(let i=13;i>=0;i--){
    const ds = shiftStr(today,-i);
    const done = dayComplete(DATA[ds]);
    const isToday = ds===today;
    dots.push(`<div class="dot ${done?'done':''} ${isToday?'today':''}" title="${ds}"></div>`);
  }

  const items = TASKS.map(t=>`
    <div class="item ${rec[t.key]?'checked':''}" data-k="${t.key}">
      <div class="box"><svg viewBox="0 0 24 24"><polyline points="4,12 10,18 20,6"/></svg></div>
      <div class="label"><div class="t">${t.t}</div><div class="d">${t.d}</div></div>
      <div class="ico"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="${t.icon}"/></svg></div>
    </div>`).join('');

  document.getElementById('app').innerHTML = `
    <div class="topline">
      <span class="date">${fmtDate()}</span>
      <span class="best">record <b>${best}</b></span>
    </div>
    <div class="hero">
      <div class="eyebrow">Giorni di fila</div>
      <div class="count ${s===0?'zero':''}">${s}</div>
      <div class="count-label">${s===1?'giorno':'giorni'}</div>
      <div class="subnote">${subnote(s, allDone)}</div>
    </div>
    <div class="chain">${dots.join('')}</div>
    <div class="cardtitle">Oggi</div>
    <div class="cardsub">Spunta tutto e il giorno entra nella catena.</div>
    <div class="list">${items}</div>
    <div class="done-banner ${allDone?'show':''}">Tutto fatto per oggi. Ci vediamo domani.</div>
    <div class="foot">
      <button class="export" id="export"><svg viewBox="0 0 24 24"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>Scarica Excel</button>
      <button class="reset" id="reset">Azzera tutti i dati</button>
    </div>
  `;

  document.querySelectorAll('.item').forEach(el=>{
    el.addEventListener('click', async ()=>{
      const k = el.dataset.k;
      DATA[today][k] = !DATA[today][k];
      await save();
      render();
    });
  });
  document.getElementById('export').addEventListener('click', exportExcel);
  document.getElementById('reset').addEventListener('click', async ()=>{
    if(confirm('Sicuro? Questo cancella tutti i giorni salvati e il conteggio riparte da zero.')){
      DATA = {};
      await save();
      render();
    }
  });
}

function exportExcel(){
  if(typeof XLSX === 'undefined'){ alert('Componente Excel non ancora caricato, riprova tra un istante.'); return; }
  const keys = Object.keys(DATA).sort();
  const giorni = ['Domenica','Lunedì','Martedì','Mercoledì','Giovedì','Venerdì','Sabato'];
  const yn = v => v ? 'Sì' : 'No';

  const rows = keys.map(k=>{
    const r = DATA[k] || {};
    const d = new Date(k+'T12:00:00');
    return {
      'Data': k,
      'Giorno': giorni[d.getDay()],
      'Lettura 7 pagine': yn(r.pages),
      'Nessuna scommessa': yn(r.nobet),
      '100g proteine': yn(r.protein),
      'Allenamento': yn(r.workout),
      'Giorno completo': dayComplete(r) ? 'Sì' : 'No'
    };
  });

  const completi = keys.filter(k=>dayComplete(DATA[k])).length;
  const nobetGiorni = keys.filter(k=>DATA[k] && DATA[k].nobet).length;
  const summary = [
    {'Statistica':'Giorni di fila (attuale)', 'Valore':streak()},
    {'Statistica':'Record giorni di fila', 'Valore':bestStreak()},
    {'Statistica':'Giorni completi totali', 'Valore':completi},
    {'Statistica':'Giorni senza scommesse', 'Valore':nobetGiorni},
    {'Statistica':'Giorni tracciati', 'Valore':keys.length},
    {'Statistica':'Esportato il', 'Valore':todayStr()}
  ];

  const wb = XLSX.utils.book_new();

  const wsLog = XLSX.utils.json_to_sheet(rows.length ? rows : [{'Data':'(nessun dato ancora)'}]);
  wsLog['!cols'] = [{wch:12},{wch:11},{wch:16},{wch:18},{wch:14},{wch:13},{wch:16}];
  XLSX.utils.book_append_sheet(wb, wsLog, 'Diario');

  const wsSum = XLSX.utils.json_to_sheet(summary);
  wsSum['!cols'] = [{wch:26},{wch:14}];
  XLSX.utils.book_append_sheet(wb, wsSum, 'Riepilogo');

  XLSX.writeFile(wb, 'giorni-di-fila_'+todayStr()+'.xlsx');
}

(async()=>{ await load(); render(); })();

if('serviceWorker' in navigator){
  window.addEventListener('load', ()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
